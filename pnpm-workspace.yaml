packages:
  - apps/*
  - crates/*
  - packages/*
  - legacy/*
  - assets
overrides:
  ioredis: ^5.11.1
allowBuilds:
  '@firebase/util': false
  '@sentry/cli': false
  argon2: true
  cbor-extract: false
  es5-ext: false
  esbuild: true
  msgpackr-extract: false
  protobufjs: false
  sharp: true
  ttf2woff2: true
  unrs-resolver: false
  wasm-pack: false
