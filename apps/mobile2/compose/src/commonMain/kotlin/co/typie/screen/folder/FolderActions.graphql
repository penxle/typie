mutation FolderActions_RenameFolder_Mutation($input: RenameFolderInput!) {
  renameFolder(input: $input) {
    id
    name
  }
}

mutation FolderActions_UpdateEntityIcon_Mutation($input: UpdateEntityIconInput!) {
  updateEntityIcon(input: $input) {
    id
    icon
    iconColor
  }
}

mutation FolderActions_DeleteEntities_Mutation($input: DeleteEntitiesInput!) {
  deleteEntities(input: $input) @catch(to: THROW) {
    id
  }
}
