query HomeScreen_Query($siteId: ID!) {
  site(siteId: $siteId) @catch(to: THROW) {
    id
    name
  }

  me @catch(to: THROW) {
    id

    recentlyViewedEntities(siteId: $siteId) {
      id
      slug
      type

      node {
        __typename

        ... on Document {
          id
          type
          title
          subtitle
          excerpt
          updatedAt

          entity {
            id
            slug
            icon
            iconColor
            parent {
              id

              node {
                __typename

                ... on Folder {
                  id
                  name
                  entity {
                    id
                    icon
                    iconColor
                  }
                }
              }
            }
          }
        }

        ... on Folder {
          id
          name
          documentCount

          entity {
            id
            slug
            icon
            iconColor
          }
        }
      }
    }
  }
}
