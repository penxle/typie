query HomeSearch_Header_Query($siteId: ID!) {
  site(siteId: $siteId) @catch(to: THROW) {
    id
    name
  }
}

query HomeScreen_Search_Query($siteId: ID!, $query: String!) {
  search(siteId: $siteId, query: $query) {
    hits {
      ... on SearchHitDocument {
        title
        subtitle
        text
        document {
          id
          title
          subtitle
          type
          excerpt
          updatedAt
          entity {
            id
            slug
            icon
            iconColor
            parent {
              id

              node {
                __typename

                ... on Folder {
                  id
                  name
                  entity {
                    id
                    icon
                    iconColor
                  }
                }
              }
            }
          }
        }
      }
      ... on SearchHitFolder {
        name
        folder {
          name
          documentCount
          entity {
            id
            icon
            iconColor
          }
        }
      }
    }
  }
}
