query HomeSearch_Header_Query($siteId: ID!) {
  site(siteId: $siteId) @catch(to: THROW) {
    id
    name
  }
}

query HomeScreen_Search_Query($siteId: ID!, $query: String!) {
  search(siteId: $siteId, query: $query) {
    hits {
      ... on SearchHitDocument {
        title
        text
        document {
          id
          title
          type
          previewUrl
          updatedAt
          entity {
            id
            slug
          }
        }
      }
      ... on SearchHitFolder {
        name
        folder {
          name
          entity {
            id
          }
        }
      }
    }
  }
}
