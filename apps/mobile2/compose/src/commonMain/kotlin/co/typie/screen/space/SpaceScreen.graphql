query SpaceScreen_Query($siteId: ID!) {
  site(siteId: $siteId) @catch(to: THROW) {
    id
    name
    folderCount
    documentCount

    entities {
      id
      depth
      order
      slug
      url
      icon
      iconColor
      type
      visibility
      availability

      ancestors {
        id

        node {
          __typename

          ... on Folder {
            id
            name
          }
        }
      }

      node {
        __typename

        ... on Folder {
          id
          name
          maxDescendantFoldersDepth
          characterCount
          thumbnail {
            id
            url
          }
          folderCount
          documentCount
        }

        ... on Document {
          id
          title
          subtitle
          excerpt
          updatedAt
        }
      }
    }
  }
}
