mutation DocumentActions_UpdateDocument_Mutation($input: UpdateDocumentInput!) {
  updateDocument(input: $input) {
    id
    title
  }
}

mutation DocumentActions_DuplicateDocument_Mutation($input: DuplicateDocumentInput!) {
  duplicateDocument(input: $input) {
    id
    entity {
      id
    }
  }
}

mutation DocumentActions_UpdateDocumentType_Mutation($input: UpdateDocumentTypeInput!) {
  updateDocumentType(input: $input) {
    id
    type
    entity {
      id
      site {
        id
        documentTemplates {
          id
        }
      }
    }
  }
}

mutation DocumentActions_UpdateEntityIcon_Mutation($input: UpdateEntityIconInput!) {
  updateEntityIcon(input: $input) {
    id
    icon
    iconColor
  }
}

mutation DocumentActions_DeleteDocument_Mutation($input: DeleteDocumentInput!) {
  deleteDocument(input: $input) {
    id
  }
}
