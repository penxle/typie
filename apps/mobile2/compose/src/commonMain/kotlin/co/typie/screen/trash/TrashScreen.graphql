query TrashScreen_WithSiteId_Query($siteId: ID!) {
  site(siteId: $siteId) @catch(to: THROW) {
    id
    name

    deletedEntities {
      id
      icon
      iconColor
      ancestors {
        id
        node {
          ... on Folder {
            id
            name
          }
        }
      }
      node {
        ... on Folder {
          id
          name
        }

        ... on Document {
          id
          title
          subtitle
          excerpt
          updatedAt
        }
      }
    }
  }
}

query TrashScreen_WithEntityId_Query($entityId: ID!) {
  entity(entityId: $entityId) @catch(to: THROW) {
    id
    icon
    iconColor
    state
    site {
      id
      name
    }
    ancestors {
      id
      node {
        ... on Folder {
          id
          name
        }
      }
    }
    node {
      ... on Folder {
        id
        name
      }

      ... on Document {
        id
        title
        subtitle
        excerpt
        updatedAt
      }
    }

    deletedChildren {
      id
      icon
      iconColor
      ancestors {
        id
        node {
          ... on Folder {
            id
            name
          }
        }
      }
      node {
        ... on Folder {
          id
          name
        }

        ... on Document {
          id
          title
          subtitle
          excerpt
          updatedAt
        }
      }
    }
  }
}

mutation TrashScreen_RecoverEntity_Mutation($input: RecoverEntityInput!) {
  recoverEntity(input: $input) {
    id
    ancestors {
      id
      node {
        ... on Folder {
          id
          name
        }
      }
    }
    node {
      ... on Folder {
        id
        name
      }

      ... on Document {
        id
        title
      }
    }
  }
}

mutation TrashScreen_PurgeEntities_Mutation($input: PurgeEntitiesInput!) {
  purgeEntities(input: $input) {
    id
  }
}
