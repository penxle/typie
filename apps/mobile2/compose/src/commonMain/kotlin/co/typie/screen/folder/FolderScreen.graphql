query FolderScreen_Query($entityId: ID!) {
  entity(entityId: $entityId) @catch(to: THROW) {
    id
    depth
    url
    icon
    iconColor
    visibility
    availability

    site {
      id
      name
    }

    ancestors {
      id

      node {
        __typename

        ... on Folder {
          id
          name
        }
      }
    }

    node {
      __typename

      ... on Folder {
        id
        name
        maxDescendantFoldersDepth
        characterCount
        thumbnail {
          id
          url
        }
        folderCount
        documentCount
      }
    }

    children {
      id
      depth
      order
      slug
      url
      icon
      iconColor
      type
      visibility
      availability

      ancestors {
        id

        node {
          __typename

          ... on Folder {
            id
            name
          }
        }
      }

      node {
        __typename

        ... on Folder {
          id
          name
          maxDescendantFoldersDepth
          characterCount
          thumbnail {
            id
            url
          }
          folderCount
          documentCount
        }

        ... on Document {
          id
          title
          subtitle
          excerpt
          updatedAt
        }
      }
    }
  }
}
