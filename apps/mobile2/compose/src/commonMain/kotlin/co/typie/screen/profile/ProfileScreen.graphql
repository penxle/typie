query ProfileScreen_Query {
  me @catch(to: THROW) {
    id
    name
    email

    subscription {
      id
      plan {
        id
        name
      }
    }

    characterCountChanges {
      date
      additions
    }

    avatar {
      id
      ...Img_image
    }
  }
}

mutation ProfileScreen_SubmitFeedback_Mutation($input: SubmitFeedbackInput!) {
  submitFeedback(input: $input)
}
