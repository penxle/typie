query SpacePopover_Query {
  me @catch(to: THROW) {
    sites {
      id
      name
      url

      logo {
        id
        ...Img_image
      }
    }
  }
}

mutation SpacePopover_CreateSite_Mutation($input: CreateSiteInput!) {
  createSite(input: $input) {
    id
    name

    logo {
      id
      ...Img_image
    }
  }
}
