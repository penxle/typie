query HomeScreen_Query($siteId: ID!) {
  site(siteId: $siteId) @catch(to: THROW) {
    name
  }

  me @catch(to: THROW) {
    recentlyViewedEntities(siteId: $siteId) {
      type

      node {
        __typename

        ... on Document {
          type
          title
          subtitle
          excerpt
          updatedAt

          entity {
            id

            parent {
              node {
                __typename

                ... on Folder {
                  name
                  entity {
                    ...EntityIcon_entity
                  }
                }
              }
            }

            ...EntityIcon_entity
          }
        }

        ... on Folder {
          id
          name
          documentCount

          entity {
            id
            slug

            ...EntityIcon_entity
          }
        }
      }
    }
  }
}
