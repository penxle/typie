query HomeScreen_Query($siteId: ID!) {
  site(siteId: $siteId) @catch(to: THROW) {
    name
  }

  me @catch(to: THROW) {
    recentlyViewedEntities(siteId: $siteId) {
      type

      node {
        __typename

        ... on Document {
          entity {
            ...EntityRow_entity
            ...EntityRowParent_entity
          }
        }

        ... on Folder {
          entity {
            ...EntityRow_entity
          }
        }
      }
    }
  }
}
