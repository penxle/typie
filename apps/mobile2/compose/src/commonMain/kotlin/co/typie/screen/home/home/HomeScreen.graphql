fragment HomeRecentDocument_document on Document {
  id
  title
  subtitle
  excerpt
  updatedAt
  characterCount
  characterCountChange {
    additions
    deletions
  }

  entity {
    id
    ...EntityIcon_entity

    ancestors {
      node {
        __typename

        ... on Folder {
          name
        }
      }
    }
  }
}

fragment HomeRecentFolder_folder on Folder {
  entity {
    ...EntityRow_entity
  }
}

query HomeScreen_Query($siteId: ID!) {
  site(siteId: $siteId) @catch(to: THROW) {
    name
  }

  me @catch(to: THROW) {
    id
    name
    email

    avatar {
      id

      ...Img_image
    }

    recentlyViewedEntities(siteId: $siteId) {
      type

      node {
        __typename

        ... on Document {
          ...HomeRecentDocument_document
        }

        ... on Folder {
          ...HomeRecentFolder_folder
        }
      }
    }
  }
}
