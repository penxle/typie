subscription MainShell_SiteUpdateStream_Subscription($siteId: ID!) {
  siteUpdateStream(siteId: $siteId) {
    ... on Site {
      id
      name
      folderCount
      documentCount

      entities {
        ...EntityRow_entity
      }
    }

    ... on Entity {
      ...EntityDetails_entity

      site {
        id
        name
      }

      children {
        ...EntityRow_entity
      }
    }
  }
}
