query SearchScreen_Query($siteId: ID!) {
  site(siteId: $siteId) @catch(to: THROW) {
    id
    name
  }
}

query SearchScreen_Search_Query($siteId: ID!, $query: String!) {
  search(siteId: $siteId, query: $query) {
    hits {
      ... on SearchHitDocument {
        title
        subtitle
        text

        document {
          id
          title
          subtitle
          type
          excerpt
          updatedAt

          entity {
            id
            slug

            parent {
              id

              node {
                __typename

                ... on Folder {
                  id
                  name

                  entity {
                    ...EntityIcon_entity
                  }
                }
              }
            }

            ...EntityIcon_entity
          }
        }
      }

      ... on SearchHitFolder {
        name

        folder {
          name
          folderCount
          documentCount

          entity {
            ...EntityIcon_entity
          }
        }
      }
    }
  }
}
