query SearchScreen_RecentlyViewed_Query($siteId: ID!) {
  me {
    id
    recentlyViewedEntities(siteId: $siteId) {
      id
      slug
      type

      node {
        __typename

        ... on Document {
          id
          title
          excerpt
          documentType: type
          updatedAt
        }
      }
    }
  }
}
