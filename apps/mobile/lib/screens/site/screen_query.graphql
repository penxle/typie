# import 'package:typie/widgets/img.graphql'

query SiteScreen_Query($siteId: ID!) {
  me {
    id

    subscription {
      id
    }

    sites {
      id
      name

      logo {
        id
        ...Img_image
      }
    }
  }

  site(siteId: $siteId) {
    id
    name

    logo {
      id
      ...Img_image
    }
  }
}
