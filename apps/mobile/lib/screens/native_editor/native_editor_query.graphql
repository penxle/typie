query NativeEditorScreen_Query($slug: String!) {
  entity(slug: $slug) {
    id
    slug
    url
    visibility

    site {
      id
      documentTemplates {
        id
        title
        entity {
          id
          slug
        }
      }
    }

    node {
      __typename

      ... on Document {
        id
        title
        nullableTitle
        subtitle
        type
        snapshot
        createdAt
        updatedAt
        characterCountChange {
          additions
          deletions
        }
      }
    }
  }

  me {
    id
    preferences
    subscription {
      id
    }

    textReplacements {
      __typename
      ... on TextReplacement {
        id
        match
        substitute
        regex
      }
      ... on TextReplacementPreference {
        id
        state
        textReplacement {
          id
          match
          substitute
          regex
        }
      }
    }
  }
}
