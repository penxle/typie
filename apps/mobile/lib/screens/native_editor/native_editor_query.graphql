query NativeEditorScreen_Query($slug: String!) {
  entity(slug: $slug) {
    id
    slug
    url
    visibility

    site {
      id
    }

    node {
      __typename

      ... on Document {
        id
        title
        nullableTitle
        subtitle
        snapshot
        createdAt
        updatedAt
        characterCountChange {
          additions
          deletions
        }
      }
    }
  }

  me {
    id
    preferences
    subscription {
      id
    }
  }
}
