query EditorScreen_Query($entityId: ID!) {
  me @catch(to: THROW) {
    id
    role
    name
    preferences
    avatar {
      ...Img_image
    }
  }

  entity(entityId: $entityId) @catch(to: THROW) {
    id

    user {
      id
    }

    site {
      id
    }

    ...EntityIcon_entity

    node {
      __typename

      ... on Document {
        id
        locked
        nullableTitle
        subtitle
        state {
          graph
        }
        assets {
          __typename

          ... on Image {
            id
            url
            width
            height
            ratio
            placeholder
          }

          ... on File {
            id
            name
            size
            url
          }

          ... on Embed {
            id
            url
            title
            description
            thumbnailUrl
            html
          }
        }
        toolbarFontFamilies: fontFamilies(sources: [DEFAULT, USER, FALLBACK]) {
          ...EditorSettingsFontFamily_family
        }
        ...FontLoader_Document
      }
    }
  }
}

mutation EditorScreen_ViewEntity_Mutation($input: ViewEntityInput!, $siteId: ID!) {
  viewEntity(input: $input) {
    id

    user {
      id

      recentlyViewedEntities(siteId: $siteId) {
        id
      }
    }
  }
}

mutation EditorScreen_UpdateDocument_Mutation($input: UpdateDocumentInput!) {
  updateDocument(input: $input) {
    id
    nullableTitle
    subtitle
  }
}

mutation EditorScreen_PushDocumentChangesets_Mutation($input: PushDocumentChangesetsInput!) {
  pushDocumentChangesets(input: $input) {
    heads
  }
}

mutation EditorScreen_PersistBlobAsFile_Mutation($input: PersistBlobAsFileInput!) {
  persistBlobAsFile(input: $input) {
    id
    name
    size
    url
  }
}

mutation EditorScreen_PersistBlobAsImage_Mutation($input: PersistBlobAsImageInput!) {
  persistBlobAsImage(input: $input) {
    id
    url
    width
    height
    ratio
    placeholder
  }
}

mutation EditorScreen_UnfurlEmbed_Mutation($input: UnfurlEmbedInput!) {
  unfurlEmbed(input: $input) {
    id
    url
    title
    description
    thumbnailUrl
    html
  }
}
