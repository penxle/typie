fragment SearchResultDocument_hit on SearchHitDocument {
  title
  subtitle
  text

  document {
    entity {
      ...EntityRow_entity
      ...EntityRowParent_entity
    }
  }
}

fragment SearchResultFolder_hit on SearchHitFolder {
  name

  folder {
    entity {
      ...EntityRow_entity
      ...EntityRowParent_entity
    }
  }
}

query SearchScreen_Query($siteId: ID!) {
  site(siteId: $siteId) @catch(to: THROW) {
    id
    name
  }
}

query SearchScreen_Search_Query($siteId: ID!, $query: String!) {
  search(siteId: $siteId, query: $query) @catch(to: THROW) {
    hits {
      ...SearchResultDocument_hit
      ...SearchResultFolder_hit
    }
  }
}
