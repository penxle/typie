fragment EntityDetailsDocument_document on Document {
  characterCount
}

fragment EntityDetailsFolder_folder on Folder {
  characterCount
}

fragment EntityDetails_entity on Entity {
  ...EntityRow_entity
  ...EntityBreadcrumb_entity
  visibility
  availability

  ancestors {
    id
  }

  node {
    __typename

    ... on Document {
      ...EntityDetailsDocument_document
    }

    ... on Folder {
      ...EntityDetailsFolder_folder
    }
  }
}
