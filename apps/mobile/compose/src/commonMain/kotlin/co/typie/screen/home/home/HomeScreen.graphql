fragment HomeScreen_ContinueWriting_document on Document {
  id
  title
  excerpt
  updatedAt
  characterCount
  characterCountChange {
    additions
    deletions
  }

  entity {
    id
    ...EntityIcon_entity

    ancestors {
      id

      node {
        __typename

        ... on Folder {
          id
          name
        }
      }
    }
  }
}

fragment HomeScreen_RecentDocumentRow_document on Document {
  id
  title
  subtitle
  excerpt
  updatedAt

  entity {
    id

    ...EntityRow_entity
    ...EntityRowParent_entity
  }
}

fragment HomeScreen_RecentFolder_folder on Folder {
  id

  entity {
    ...EntityRow_entity
  }
}

query HomeScreen_Query($siteId: ID!) {
  site(siteId: $siteId) @catch(to: THROW) {
    id
    name
  }

  me @catch(to: THROW) {
    id
    name
    email

    avatar {
      id

      ...Img_image
    }

    recentlyViewedEntities(siteId: $siteId) {
      id
      type

      node {
        __typename

        ... on Document {
          ...HomeScreen_ContinueWriting_document
          ...HomeScreen_RecentDocumentRow_document
        }

        ... on Folder {
          ...HomeScreen_RecentFolder_folder
        }
      }
    }
  }
}
