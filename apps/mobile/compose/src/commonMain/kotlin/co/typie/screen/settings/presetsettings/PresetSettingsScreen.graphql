query PresetSettingsScreen_Query {
  me @catch(to: THROW) {
    id
    preferences

    documentFontFamilies(sources: [DEFAULT, USER, FALLBACK]) {
      ...FontLoader_FontFamily
      ...EditorSettingsFontFamily_family
    }
  }
}

mutation PresetSettingsScreen_UpdatePreferences_Mutation($input: UpdatePreferencesInput!) {
  updatePreferences(input: $input) {
    id
    preferences
  }
}
