query SubscriptionPurchaseService_Query {
  me {
    id
    uuid

    subscription {
      id
      state

      plan {
        id
        availability
      }
    }
  }
}

mutation SubscriptionPurchaseService_SubscribeOrChangePlanWithInAppPurchase_Mutation($input: SubscribeOrChangePlanWithInAppPurchaseInput!) {
  subscribeOrChangePlanWithInAppPurchase(input: $input) {
    id

    plan {
      id
    }
  }
}
