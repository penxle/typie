name: Build

on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
        description: The app to build.
    outputs:
      version:
        value: ${{ jobs.build.outputs.version }}
        description: The version of the built image.

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build
    runs-on: linux-arm64-4vcpu

    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: 'pnpm'

      - name: Run turbo prune
        run: pnpm dlx turbo prune @typie/${{ inputs.app }} --docker

      - name: Download WASM artifact
        uses: actions/download-artifact@v8
        with:
          name: editor-wasm
          path: out/full/crates/editor/pkg/

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            name=ghcr.io/${{ github.repository_owner }}/${{ inputs.app }}
          flavor: |
            latest=true
          tags: |
            type=sha

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          push: true
          context: .
          file: apps/${{ inputs.app }}/Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            IMAGE_TAG=${{ steps.meta.outputs.version }}
          secrets: |
            TURBO_TOKEN=${{ secrets.TURBO_TOKEN }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/cache:${{ inputs.app }}
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/cache:${{ inputs.app }},mode=max,compression=zstd,oci-mediatypes=true,ignore-error=true
