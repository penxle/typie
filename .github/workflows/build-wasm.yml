name: Build (wasm)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: arc-16x

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache WASM artifact
        id: wasm-cache
        uses: actions/cache@v5
        with:
          path: crates/editor/pkg/
          key: wasm-${{ hashFiles('crates/editor', 'Cargo.lock') }}

      - name: Setup Rust
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
          cache-all-crates: 'true'
          cache-workspace-crates: 'true'
          rustflags: ''

      - name: Build WASM
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        working-directory: crates/editor
        run: just wasm

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v7
        with:
          name: editor-wasm
          path: crates/editor/pkg/
