name: Build (wasm)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: linux-arm64-4vcpu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache WASM artifact
        id: wasm-cache
        uses: actions/cache@v5
        with:
          path: crates/editor/pkg/
          key: wasm-${{ hashFiles('crates/**', 'Cargo.lock') }}

      - name: Install pnpm
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
          cache-all-crates: 'true'
          cache-workspace-crates: 'true'
          rustflags: ''

      - name: Install wasm-pack
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: cargo install wasm-pack

      - name: Build WASM
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        working-directory: crates/editor
        run: RUSTFLAGS="-C target-feature=+simd128" wasm-pack build --target=web --no-pack

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v7
        with:
          name: editor-wasm
          path: crates/editor/pkg/
