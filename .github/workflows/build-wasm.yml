name: Build (wasm)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: arc-16x
    strategy:
      matrix:
        target: [browser, server]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache WASM artifact
        id: wasm-cache
        uses: actions/cache@v5
        with:
          path: crates/editor-ffi/pkg/
          key: wasm-${{ matrix.target }}-${{ hashFiles('.github/workflows/build-wasm.yml', 'Cargo.lock', 'crates/**') }}

      - name: Setup Rust
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
          cache-all-crates: 'true'
          cache-workspace-crates: 'true'

      - name: Build WASM
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        working-directory: crates/editor-ffi
        run: just wasm-${{ matrix.target }}

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v7
        with:
          name: editor-wasm-${{ matrix.target }}
          path: crates/editor-ffi/pkg/

  merge:
    name: Merge WASM artifacts
    needs: build
    runs-on: arc-2x
    steps:
      - name: Merge WASM artifacts
        uses: actions/upload-artifact/merge@v7
        with:
          name: editor-wasm
          pattern: editor-wasm-*
          delete-merged: true
