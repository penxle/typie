name: Deployment

on:
  workflow_call:
    inputs:
      stack:
        required: true
        type: string
        description: The stack to deploy to.
      version:
        required: true
        type: string
        description: The version to deploy.

permissions:
  contents: read

jobs:
  deploy:
    name: Deployment
    runs-on: arc-p-4x
    environment: ${{ inputs.stack }}

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: penxle

      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Checkout kube repository
        uses: actions/checkout@v6
        with:
          repository: penxle/kube
          token: ${{ steps.app-token.outputs.token }}
          path: kube

      - name: Checkout kube2 repository
        uses: actions/checkout@v6
        with:
          repository: penxle/kube2
          token: ${{ steps.app-token.outputs.token }}
          path: kube2

      - name: Update version
        run: |
          for repo in kube kube2; do
            cat > "$repo/apps/base/version.${{ inputs.stack }}.yaml" << EOF
          image:
            version: ${{ inputs.version }}
          EOF
          done

      - name: Commit and push changes
        run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          for repo in kube kube2; do
            cd "$repo"
            git add apps/base/version.${{ inputs.stack }}.yaml
            git commit -m "Deploy to ${{ inputs.stack }}: ${{ inputs.version }}"
            git push
            cd ..
          done
