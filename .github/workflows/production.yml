name: Production

on:
  workflow_dispatch:
    inputs:
      sha:
        required: false
        type: string
        description: 'Git short SHA (defaults to main HEAD)'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  get-version:
    name: Get deployment version
    runs-on: arc-p-4x
    outputs:
      sha: ${{ steps.version.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.sha }}" ]; then
            SHA=$(git rev-parse --short=7 "${{ inputs.sha }}")
          else
            SHA=$(git rev-parse --short=7 HEAD)
          fi
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Using sha: $SHA"

  tag-prod:
    name: Tag images for prod
    needs: get-version
    runs-on: arc-p-4x
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::509399603331:role/actions@github
          aws-region: ap-northeast-2

      - name: Re-tag dev images as prod
        env:
          SHA: ${{ needs.get-version.outputs.sha }}
        run: |
          for app in api website; do
            MANIFEST=$(aws ecr batch-get-image \
              --repository-name "$app" \
              --image-ids "imageTag=dev-$SHA" \
              --query 'images[0].imageManifest' --output text)
            aws ecr put-image \
              --repository-name "$app" \
              --image-tag "prod-$SHA" \
              --image-manifest "$MANIFEST"
            aws ecr put-image \
              --repository-name "$app" \
              --image-tag "prod-latest" \
              --image-manifest "$MANIFEST"
          done

  deploy-prod:
    name: Deployment (prod)
    needs: [get-version, tag-prod]
    uses: ./.github/workflows/deployment.yml
    with:
      stack: prod
      sha: ${{ needs.get-version.outputs.sha }}
    secrets: inherit
