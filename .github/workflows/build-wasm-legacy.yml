name: Build (legacy wasm)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: arc-p-16x

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache WASM artifact
        id: wasm-cache
        uses: actions/cache@v5
        with:
          path: legacy/editor/pkg/
          key: wasm-legacy-${{ hashFiles('.github/workflows/build-wasm-legacy.yml', 'legacy/editor/Cargo.lock', 'legacy/editor/**') }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
          cache-all-crates: 'true'
          cache-workspace-crates: 'true'

      - name: Build WASM
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        working-directory: legacy/editor
        run: just wasm

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v7
        with:
          name: editor-wasm-legacy
          path: legacy/editor/pkg/
