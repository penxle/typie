name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened, review_requested]

jobs:
  claude-review:
    if: |
      github.event.pull_request.draft == false &&
      (github.event.action != 'review_requested' || github.event.requested_reviewer.login == 'claude[bot]')

    runs-on: arc-2x
    permissions:
      contents: read
      pull-requests: write
      issues: read
      statuses: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: '/code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          allowed_bots: '*'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          claude_args: '--dangerously-skip-permissions'
        env:
          ACTIONS_GITHUB_TOKEN: ${{ github.token }}
