query ShareEntities_Query($entityIds: [ID!]!) {
  entities(entityIds: $entityIds) {
    id
    type
    url
    slug
    visibility
    availability

    node {
      __typename

      ... on Folder {
        id
        name

        thumbnail {
          id
          url
        }
      }

      ... on Document {
        id
        title
        password
        documentContentRating: contentRating
        allowReaction
        protectContent

        thumbnail {
          id
          url
        }
      }
    }
  }
}
