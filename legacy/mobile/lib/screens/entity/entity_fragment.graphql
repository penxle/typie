fragment EntityScreen_Entity_entity on Entity {
  id
  depth
  slug
  order
  url
  visibility
  availability

  node {
    ... on Folder {
      id
      name
      maxDescendantFoldersDepth
      characterCount
      documentCount
      folderCount
    }

    ... on Document {
      id
      title
      nullableTitle
      subtitle
      documentType: type
      excerpt
      updatedAt
      characterCount

      characterCountChange {
        additions
        deletions
      }
    }
  }

  ancestors {
    id

    node {
      ... on Folder {
        id
        name
      }
    }
  }
}
