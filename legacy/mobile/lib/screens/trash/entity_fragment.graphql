fragment TrashScreen_Entity_entity on Entity {
  id
  slug
  order
  depth
  url

  ancestors {
    id
    node {
      ... on Folder {
        id
        name
      }
    }
  }

  node {
    ... on Folder {
      id
      name
    }

    ... on Document {
      id
      title
      excerpt
      # TODO: add type
      updatedAt
    }
  }
}
