query NotesScreen_Query($siteId: ID!) {
  me {
    id
    recentlyViewedEntities(siteId: $siteId) {
      id
      slug
      node {
        __typename
        ... on Document {
          id
          title
          documentType: type
        }
      }
    }
  }

  notes(siteId: $siteId) {
    id
    content
    createdAt
    updatedAt
    order
    color
    entity {
      id
      slug
      node {
        __typename
        ... on Document {
          id
          title
          documentType: type
        }
      }
    }
  }
}
