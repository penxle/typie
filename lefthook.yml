output: false
pre-commit:
  parallel: true
  commands:
    eslint:
      glob: '*.{ts,tsx,js,jsx,svelte}'
      run: bunx eslint --fix --quiet {staged_files}
      stage_fixed: true
    prettier:
      glob: '*.{ts,tsx,js,jsx,svelte,json,yaml,yml,md,graphql}'
      run: bunx prettier --write --ignore-unknown --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
    cspell:
      glob: '*'
      run: bunx cspell --no-progress --relative --no-must-find-files {staged_files}
    dart-fix:
      glob: '*.dart'
      run: |
        for file in {staged_files}; do
          dart fix --apply "$file"
        done
      stage_fixed: true
    dart-format:
      glob: '*.dart'
      run: dart format {staged_files}
      stage_fixed: true
    rust-fmt:
      glob: '*.rs'
      run: cargo fmt -- {staged_files}
      stage_fixed: true
